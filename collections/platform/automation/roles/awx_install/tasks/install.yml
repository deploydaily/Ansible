---
- name: Add AWX install dir to git safe directories
  ansible.builtin.command: git config --global --add safe.directory {{ awx_install_dir }}
  changed_when: false

- name: Clone AWX source
  ansible.builtin.git:
    repo: https://github.com/ansible/awx.git
    dest: "{{ awx_install_dir }}"
    version: "{{ awx_version }}"
    depth: 1
    force: false

- name: Upgrade pip and setuptools for Python 3.11
  ansible.builtin.shell: python3.11 -m pip install --upgrade pip setuptools wheel
  changed_when: true

- name: Install AWX Python requirements for Python 3.11 (excluding xmlsec and pinned build tools)
  ansible.builtin.shell: |
    grep -v "^xmlsec\|^pip==\|^setuptools==" \
      {{ awx_install_dir }}/requirements/requirements.txt \
      > /tmp/requirements_filtered.txt
    python3.11 -m pip install -r /tmp/requirements_filtered.txt
  changed_when: true
  environment:
    PKG_CONFIG_PATH: /usr/lib64/pkgconfig:/usr/share/pkgconfig

- name: Install git-sourced requirements for Python 3.11
  ansible.builtin.shell: |
    python3.11 -m pip install \
      "git+https://github.com/ansible/ansible-runner.git@devel" \
      "git+https://github.com/ansible/system-certifi.git@devel" \
      "django-ansible-base[rest_filters,jwt_consumer,resource_registry,rbac] @ git+https://github.com/ansible/django-ansible-base@devel"
  changed_when: true

- name: Pin Django to AWX 24.6.1 compatible version
  ansible.builtin.shell: python3.11 -m pip install "django==4.2.10"
  changed_when: true

- name: Set AWX version file to avoid setuptools_scm issues
  ansible.builtin.copy:
    content: "{{ awx_version }}"
    dest: "{{ awx_install_dir }}/awx/VERSION"
    owner: "{{ awx_user }}"
    group: "{{ awx_group }}"
    mode: "0644"

- name: Set ownership of install dir
  ansible.builtin.file:
    path: "{{ awx_install_dir }}"
    owner: "{{ awx_user }}"
    group: "{{ awx_group }}"
    recurse: true