---
- name: Clone AWX source
  ansible.builtin.git:
    repo: https://github.com/ansible/awx.git
    dest: "{{ awx_install_dir }}"
    version: "{{ awx_version }}"
    depth: 1
    force: false

- name: Upgrade pip and setuptools before AWX requirements
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    executable: pip3

- name: Install AWX Python requirements (excluding xmlsec and pinned build tools)
  ansible.builtin.shell: |
    grep -v "^xmlsec\|^pip==\|^setuptools==" \
      {{ awx_install_dir }}/requirements/requirements.txt \
      > /tmp/requirements_filtered.txt
    pip3 install -r /tmp/requirements_filtered.txt
  changed_when: true
  environment:
    PKG_CONFIG_PATH: /usr/lib64/pkgconfig:/usr/share/pkgconfig

- name: Install AWX git-sourced requirements (includes django-ansible-base)
  ansible.builtin.pip:
    requirements: "{{ awx_install_dir }}/requirements/requirements_git.txt"
    executable: pip3

- name: Set AWX version file to avoid setuptools_scm issues
  ansible.builtin.copy:
    content: "{{ awx_version }}"
    dest: "{{ awx_install_dir }}/awx/VERSION"
    owner: "{{ awx_user }}"
    group: "{{ awx_group }}"
    mode: "0644"

- name: Set ownership of install dir
  ansible.builtin.file:
    path: "{{ awx_install_dir }}"
    owner: "{{ awx_user }}"
    group: "{{ awx_group }}"
    recurse: true