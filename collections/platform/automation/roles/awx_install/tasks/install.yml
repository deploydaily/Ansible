---
- name: Clone AWX source
  ansible.builtin.git:
    repo: https://github.com/ansible/awx.git
    dest: "{{ awx_install_dir }}"
    version: "{{ awx_version }}"
    depth: 1
    force: false

- name: Upgrade pip and setuptools before AWX requirements
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    executable: pip3

- name: Install AWX Python requirements (excluding xmlsec)
  ansible.builtin.shell: |
    grep -v "^xmlsec\|^pip==\|^setuptools==" \
      {{ awx_install_dir }}/requirements/requirements.txt \
      > /tmp/requirements_filtered.txt
    pip3 install -r /tmp/requirements_filtered.txt
  changed_when: true
  environment:
    PKG_CONFIG_PATH: /usr/lib64/pkgconfig:/usr/share/pkgconfig

- name: Install AWX package in editable mode
  ansible.builtin.pip:
    name: "{{ awx_install_dir }}"
    extra_args: "--no-build-isolation -e"
    executable: pip3

- name: Set ownership of install dir
  ansible.builtin.file:
    path: "{{ awx_install_dir }}"
    owner: "{{ awx_user }}"
    group: "{{ awx_group }}"
    recurse: true