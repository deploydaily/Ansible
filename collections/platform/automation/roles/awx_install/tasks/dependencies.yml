---
- name: Install system packages
  ansible.builtin.dnf:
    name:
      - git
      - python3
      - python3-pip
      - python3-devel
      - gcc
      - gcc-c++
      - make
      - libffi-devel
      - openssl-devel
      - postgresql15
      - nginx
      - redis
      - nodejs
      - npm
      - unzip
      - curl
      - jq
      - openssl
    state: present
    update_cache: true

- name: Install Python packages
  ansible.builtin.pip:
    name:
      - ansible-core
      - awxkit
      - django
      - djangorestframework
      - channels
      - daphne
      - celery
      - psycopg2-binary
      - redis
      - cryptography
      - pexpect
      - python-dateutil
      - requests
      - boto3
      - botocore
      - receptorctl
    state: present
    executable: pip3