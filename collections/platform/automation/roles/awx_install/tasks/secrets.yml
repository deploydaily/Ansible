---
- name: Fetch DB password from Secrets Manager
  ansible.builtin.command: >
    aws secretsmanager get-secret-value
    --region {{ aws_region | default('us-east-1') }}
    --secret-id {{ awx_db_secret_name }}
    --query SecretString
    --output text
  register: db_secret_raw
  changed_when: false
  no_log: true
  when: awx_db_secret_name is defined

- name: Set DB password from secret
  ansible.builtin.set_fact:
    awx_db_password: "{{ db_secret_raw.stdout }}"
  no_log: true
  when: awx_db_secret_name is defined

- name: Fetch admin password from Secrets Manager
  ansible.builtin.command: >
    aws secretsmanager get-secret-value
    --region {{ aws_region | default('us-east-1') }}
    --secret-id {{ awx_admin_secret_name }}
    --query SecretString
    --output text
  register: admin_secret_raw
  changed_when: false
  no_log: true
  when: awx_admin_secret_name is defined

- name: Set admin password from secret
  ansible.builtin.set_fact:
    awx_admin_password: "{{ admin_secret_raw.stdout }}"
  no_log: true
  when: awx_admin_secret_name is defined