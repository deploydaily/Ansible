---
# OS baseline defaults

# NTP
ntp_servers:
  - 169.254.169.123  # AWS Time Sync

# DNS
dns_servers:
  - 169.254.169.253  # AWS VPC DNS

# SSH hardening
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# Ansible user
ansible_managed_user: ansible
ansible_managed_user_shell: /bin/bash

# Packages to install (RHEL)
baseline_packages_rhel:
  - vim
  - curl
  - wget
  - unzip
  - tar
  - git
  - python3
  - python3-pip
  - tmux
  - net-tools
  - bind-utils
  - lsof
  - strace
  - tcpdump

# Packages to install (Windows)
baseline_packages_windows:
  - python3
  - git